name: potret_app
description: "Story App - Dicoding Flutter Intermediate Submission"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^14.6.3
  shared_preferences: ^2.3.3
  http: ^1.2.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#FFF8F0"
  adaptive_icon_foreground: "assets/images/icon-transparent.png"
  adaptive_icon_monochrome: "assets/images/icon-transparent.png"
  min_sdk_android: 21
  remove_alpha_ios: true

